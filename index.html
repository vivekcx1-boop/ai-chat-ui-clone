<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: white;
      font-family: sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 48px; margin-bottom: 40px; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .search-box {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 24px;
      padding: 16px 20px; display: flex; align-items: center; gap: 12px;
      max-width: 700px; width: 100%;
    }
 .search-box input {
      background: transparent; border: none; outline: none;
      color: white; font-size: 16px; flex: 1;
    }
 .search-box input::placeholder { color: #666; }
 .badge { background: #2563eb; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 14px; }
 .badge:hover { background: #1d4ed8; }
 .chat-area {
      max-width: 700px; width: 100%; margin: 30px auto 0;
      display: flex; flex-direction: column; gap: 12px;
      max-height: 400px; overflow-y: auto;
    }
 .user-msg {
      background: #3b82f6; padding: 12px 16px; border-radius: 12px 12px 4px 12px;
      align-self: flex-end; max-width: 70%;
    }
 .bot-msg {
      background: #1f2937; padding: 12px 16px; border-radius: 12px 12px 12px 4px;
      align-self: flex-start; max-width: 70%; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>AI Chat</h1>
  <div class="search-box">
    <input type="text" placeholder="Ask anything..." id="userInput">
    <span class="badge" id="sendBtn">Flash-Lite</span>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <p style="color:#666; margin-top:20px; font-size:14px;">Powered by Gemini AI</p>

  <script type="module">
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatArea = document.getElementById('chatArea');
    const GEMINI_API_KEY = import.meta.env.VITE_GEMINI_KEY;

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = sender;
      msg.textContent = text;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }

    async function getAIResponse(userText) {
      if (!GEMINI_API_KEY) {
        throw new Error('API Key missing. Vercel mein set karna hai');
      }
      const url = const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.candidates[0].content.parts[0].text;
    }

    async function handleSend() {
      if (input.value.trim() === '') return;
      const userMsg = input.value;
      addMessage(userMsg, 'user-msg');
      input.value = '';
      const loadingMsg = addMessage('Thinking...', 'bot-msg');
      try {
        const aiReply = await getAIResponse(userMsg);
        loadingMsg.textContent = aiReply;
      } catch (error) {
        loadingMsg.textContent = 'Error: ' + error.message;
      }
    }

    input.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
    sendBtn.addEventListener('click', handleSend);
  </script>
</body>
</html>
